services:
  chatbot:
    build: .
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"
    environment:
      # Server
      - PORT=8080
    volumes:
      - ./backend/app:/app/app
      - ./widget:/app/widget
      - ./data:/app/data
      - ./knowledge:/app/knowledge
    restart: unless-stopped

  # Optional: PostgreSQL database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: chatbot
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    profiles:
      - postgres

volumes:
  postgres_data:
